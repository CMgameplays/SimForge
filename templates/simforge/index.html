<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SimForge — Wave Balance Simulator | CMG Forge</title>
  <meta name="author" content="CMG Forge" />
  <meta name="description" content="SimForge — Wave balance simulator for game designers by CMG Forge." />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link
    href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=Share+Tech+Mono&display=swap"
    rel="stylesheet"
  />

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>

  <style>
    /* ── Design Tokens ───────────────────────────────────────── */
    :root {
      --forge-bg:        #08090f;
      --forge-surface:   #0f1120;
      --forge-purple:    #a855f7;
      --forge-indigo:    #6366f1;
      --forge-ember:     #f97316;
      --forge-text:      #f1f5f9;
      --forge-muted:     #64748b;
      --forge-green:     #22c55e;
      --forge-danger:    #ff4444;

      --indigo-08:  rgba(99,102,241,0.08);
      --indigo-12:  rgba(99,102,241,0.12);
      --indigo-15:  rgba(99,102,241,0.15);
      --indigo-20:  rgba(99,102,241,0.20);
      --indigo-30:  rgba(99,102,241,0.30);
      --ember-15:   rgba(249,115,22,0.15);
      --ember-40:   rgba(249,115,22,0.40);
      --danger-08:  rgba(255,68,68,0.08);
      --danger-25:  rgba(255,68,68,0.25);
      --green-08:   rgba(34,197,94,0.08);
      --green-25:   rgba(34,197,94,0.25);

      --font-ui:   'Rajdhani', system-ui, sans-serif;
      --font-mono: 'Share Tech Mono', monospace;

      --nav-h:    60px;
      --foot-h:   44px;

      /* Angled cut sizes */
      --cut-lg: 10px;
      --cut-md: 8px;
      --cut-sm: 5px;
    }

    /* ── Reset ───────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      background: var(--forge-bg);
      color: var(--forge-text);
      font-family: var(--font-ui);
      font-size: 15px;
      line-height: 1.5;
      overflow-x: hidden;
    }

    /* Blueprint grid */
    body {
      background-image:
        linear-gradient(rgba(99,102,241,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(99,102,241,0.04) 1px, transparent 1px);
      background-size: 40px 40px;
      background-attachment: fixed;
    }

    ::-webkit-scrollbar            { width: 6px; }
    ::-webkit-scrollbar-track      { background: var(--forge-bg); }
    ::-webkit-scrollbar-thumb      { background: var(--indigo-30); border-radius: 0; }
    ::-webkit-scrollbar-thumb:hover{ background: var(--forge-indigo); }

    /* ── Navbar ──────────────────────────────────────────────── */
    .navbar {
      position: sticky;
      top: 0;
      z-index: 200;
      height: var(--nav-h);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 28px;
      background: rgba(8,9,15,0.94);
      backdrop-filter: blur(14px);
      border-bottom: 1px solid var(--indigo-20);
    }

    .nav-logo {
      display: flex;
      align-items: center;
      gap: 11px;
      text-decoration: none;
      font-family: var(--font-ui);
      font-weight: 700;
      font-size: 16px;
      letter-spacing: 3px;
      color: var(--forge-text);
      transition: color .15s;
    }
    .nav-logo:hover { color: var(--forge-ember); }

    .nav-logo-mark {
      width: 32px;
      height: 32px;
      background: var(--forge-ember);
      clip-path: polygon(0 0, calc(100% - 7px) 0, 100% 7px, 100% 100%, 7px 100%, 0 calc(100% - 7px));
      display: grid;
      place-items: center;
      font-size: 11px;
      font-weight: 700;
      color: #09090f;
      letter-spacing: 0;
      flex-shrink: 0;
      font-family: var(--font-ui);
    }

    .nav-right {
      display: flex;
      align-items: center;
      gap: 20px;
    }

    .nav-tool-badge {
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--forge-muted);
      letter-spacing: 1.5px;
      border-left: 1px solid var(--indigo-20);
      padding-left: 16px;
    }

    .nav-link {
      font-family: var(--font-ui);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 2.5px;
      color: var(--forge-muted);
      text-decoration: none;
      text-transform: uppercase;
      padding: 5px 14px;
      border: 1px solid var(--indigo-20);
      clip-path: polygon(0 0, calc(100% - var(--cut-sm)) 0, 100% var(--cut-sm), 100% 100%, var(--cut-sm) 100%, 0 calc(100% - var(--cut-sm)));
      transition: color .15s, border-color .15s;
    }
    .nav-link:hover {
      color: var(--forge-text);
      border-color: var(--forge-indigo);
    }

    /* ── App wrapper ─────────────────────────────────────────── */
    .app-wrapper {
      display: flex;
      flex-direction: column;
      min-height: calc(100vh - var(--nav-h));
    }

    /* ── Main grid ───────────────────────────────────────────── */
    main {
      display: grid;
      grid-template-columns: 340px 1fr;
      flex: 1;
      min-height: calc(100vh - var(--nav-h) - var(--foot-h));
    }

    @media (max-width: 860px) {
      main { grid-template-columns: 1fr; }
    }

    /* ── Controls Panel ──────────────────────────────────────── */
    .controls-panel {
      border-right: 1px solid var(--indigo-12);
      padding: 0 0 40px;
      display: flex;
      flex-direction: column;
      background: rgba(15,17,32,0.65);
    }

    .controls-body {
      padding: 0 24px;
      flex: 1;
    }

    /* Section headers */
    .sec {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 22px 0 14px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 2.5px;
      color: var(--forge-muted);
      font-family: var(--font-ui);
    }

    .sec-line {
      flex: 1;
      height: 1px;
      background: var(--indigo-15);
    }

    .sec-icon { color: var(--forge-indigo); font-size: 12px; }

    /* Input rows */
    .row {
      display: flex;
      gap: 12px;
      align-items: flex-end;
      margin-bottom: 14px;
    }

    .field { display: flex; flex-direction: column; gap: 5px; flex: 1; }

    .field label {
      font-family: var(--font-ui);
      font-size: 11px;
      letter-spacing: 1.5px;
      color: var(--forge-muted);
      font-weight: 600;
    }

    input[type="number"] {
      width: 100%;
      background: var(--forge-surface);
      border: 1px solid var(--indigo-20);
      color: var(--forge-text);
      font-family: var(--font-mono);
      font-size: 15px;
      padding: 8px 12px;
      outline: none;
      border-radius: 0;
      transition: border-color .15s, box-shadow .15s;
      -moz-appearance: textfield;
    }
    input[type="number"]::-webkit-inner-spin-button,
    input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; }
    input[type="number"]:focus {
      border-color: var(--forge-indigo);
      box-shadow: 0 0 0 1px var(--indigo-15);
    }

    /* Simulate button */
    .btn-simulate {
      width: 100%;
      margin-top: 8px;
      padding: 14px 0;
      background: var(--forge-ember);
      border: none;
      color: #09090f;
      font-family: var(--font-ui);
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 3.5px;
      text-transform: uppercase;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      clip-path: polygon(0 0, calc(100% - var(--cut-lg)) 0, 100% var(--cut-lg), 100% 100%, var(--cut-lg) 100%, 0 calc(100% - var(--cut-lg)));
      transition: box-shadow .15s, transform .08s;
    }

    .btn-simulate::before {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(255,255,255,0.12);
      opacity: 0;
      transition: opacity .15s;
    }

    .btn-simulate:hover::before { opacity: 1; }
    .btn-simulate:hover         { box-shadow: 0 0 28px var(--ember-40); }
    .btn-simulate:active        { transform: scale(.985); }

    .btn-simulate .btn-label    { position: relative; z-index: 1; }

    .btn-simulate.loading {
      pointer-events: none;
      opacity: .65;
    }

    .btn-simulate.loading .btn-label::after {
      content: '';
      display: inline-block;
      width: 12px;
      animation: dots 1.2s steps(3,end) infinite;
    }
    @keyframes dots {
      0%   { content: ''; }
      33%  { content: '.'; }
      66%  { content: '..'; }
      100% { content: '...'; }
    }

    /* Error */
    .error-msg {
      font-family: var(--font-mono);
      font-size: 12px;
      color: var(--forge-danger);
      margin-top: 10px;
      padding: 8px 12px;
      border-left: 2px solid var(--forge-danger);
      background: var(--danger-08);
      display: none;
      letter-spacing: 0.5px;
    }

    /* ── Output Panel ────────────────────────────────────────── */
    .output-panel {
      display: flex;
      flex-direction: column;
      padding: 24px 32px 32px;
      gap: 20px;
    }

    .output-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .output-header h2 {
      font-family: var(--font-ui);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 3px;
      color: var(--forge-muted);
    }

    /* Chart container */
    .chart-container {
      background: var(--forge-surface);
      border: 1px solid var(--indigo-15);
      padding: 20px;
      position: relative;
      flex: 1;
      min-height: 320px;
      display: flex;
      align-items: center;
      justify-content: center;
      clip-path: polygon(0 0, calc(100% - 12px) 0, 100% 12px, 100% 100%, 12px 100%, 0 calc(100% - 12px));
    }

    .chart-container canvas {
      display: block;
      width: 100% !important;
      height: 100% !important;
    }

    /* Placeholder */
    .placeholder {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      color: var(--forge-muted);
      user-select: none;
    }

    .placeholder svg { opacity: 0.18; }

    .placeholder p {
      font-size: 13px;
      letter-spacing: 1px;
      font-weight: 600;
      font-family: var(--font-ui);
    }

    .placeholder p strong {
      color: var(--forge-ember);
      opacity: 0.85;
    }

    /* ── Summary ─────────────────────────────────────────────── */
    .summary {
      display: none;
      border: 1px solid var(--indigo-15);
      background: var(--forge-surface);
      clip-path: polygon(0 0, calc(100% - 12px) 0, 100% 12px, 100% 100%, 12px 100%, 0 calc(100% - 12px));
    }

    .summary.visible { display: block; }

    .summary-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      border-bottom: 1px solid var(--indigo-12);
    }

    .stat-cell {
      padding: 14px 18px;
      border-right: 1px solid var(--indigo-12);
    }
    .stat-cell:last-child { border-right: none; }

    .stat-label {
      font-family: var(--font-ui);
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 2px;
      color: var(--forge-muted);
      margin-bottom: 4px;
    }

    .stat-value {
      font-family: var(--font-mono);
      font-size: 22px;
      line-height: 1;
    }

    .stat-value.accent  { color: var(--forge-ember); }
    .stat-value.danger  { color: var(--forge-danger); }
    .stat-value.trivial { color: var(--forge-green); }
    .stat-value.ok      { color: var(--forge-text); }

    /* Wave pills */
    .waves-row {
      display: flex;
      align-items: flex-start;
      gap: 14px;
      padding: 12px 18px;
      border-bottom: 1px solid var(--indigo-12);
    }
    .waves-row:last-child { border-bottom: none; }

    .waves-row-label {
      font-family: var(--font-ui);
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 2px;
      color: var(--forge-muted);
      white-space: nowrap;
      padding-top: 3px;
      min-width: 110px;
    }

    .pills {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
    }

    .pill {
      font-family: var(--font-mono);
      font-size: 11px;
      padding: 2px 9px;
      letter-spacing: 0.5px;
      clip-path: polygon(0 0, calc(100% - 4px) 0, 100% 4px, 100% 100%, 4px 100%, 0 calc(100% - 4px));
    }

    .pill.danger  { background: var(--danger-08); color: var(--forge-danger); border: 1px solid var(--danger-25); }
    .pill.trivial { background: var(--green-08);  color: var(--forge-green);  border: 1px solid var(--green-25); }

    .no-waves {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--forge-muted);
      letter-spacing: 1px;
      padding-top: 3px;
    }

    /* ── Footer ──────────────────────────────────────────────── */
    footer {
      height: var(--foot-h);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
      border-top: 1px solid var(--indigo-12);
      background: rgba(8,9,15,0.7);
    }

    footer span {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--forge-muted);
      letter-spacing: 0.5px;
    }

    footer a {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--forge-indigo);
      text-decoration: none;
      letter-spacing: 0.5px;
      transition: color .15s;
    }
    footer a:hover { color: var(--forge-purple); }
  </style>
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar">
  <a href="https://cmgforge.com" class="nav-logo">
    <div class="nav-logo-mark">CF</div>
    CMG FORGE
  </a>
  <div class="nav-right">
    <span class="nav-tool-badge">SIMFORGE / WAVE BALANCE SIM</span>
    <a href="https://cmgforge.com/tools" class="nav-link">All Tools</a>
  </div>
</nav>

<div class="app-wrapper">

  <!-- MAIN GRID -->
  <main>

    <!-- LEFT: CONTROLS -->
    <aside class="controls-panel">
      <div class="controls-body">

        <!-- SIMULATION -->
        <div class="sec">
          <span class="sec-icon">◈</span>
          SIMULATION
          <div class="sec-line"></div>
        </div>

        <div class="row">
          <div class="field">
            <label for="wave_count">WAVE COUNT (5 – 50)</label>
            <input type="number" id="wave_count" value="20" min="5" max="50" />
          </div>
        </div>

        <!-- PLAYER -->
        <div class="sec">
          <span class="sec-icon">◈</span>
          PLAYER
          <div class="sec-line"></div>
        </div>

        <div class="row">
          <div class="field">
            <label for="player_hp">BASE HP</label>
            <input type="number" id="player_hp" value="100" min="1" />
          </div>
          <div class="field">
            <label for="player_dps">BASE DPS</label>
            <input type="number" id="player_dps" value="50" min="1" />
          </div>
        </div>

        <div class="row">
          <div class="field">
            <label for="player_scale">POWER SCALING / WAVE (%)</label>
            <input type="number" id="player_scale" value="10" min="0" max="200" step="0.5" />
          </div>
        </div>

        <!-- ENEMY -->
        <div class="sec">
          <span class="sec-icon">◈</span>
          ENEMY
          <div class="sec-line"></div>
        </div>

        <div class="row">
          <div class="field">
            <label for="enemy_hp">BASE HP</label>
            <input type="number" id="enemy_hp" value="80" min="1" />
          </div>
          <div class="field">
            <label for="enemy_damage">BASE DAMAGE</label>
            <input type="number" id="enemy_damage" value="20" min="1" />
          </div>
        </div>

        <div class="row">
          <div class="field">
            <label for="enemy_scale">DIFFICULTY SCALING / WAVE (%)</label>
            <input type="number" id="enemy_scale" value="15" min="0" max="200" step="0.5" />
          </div>
        </div>

        <!-- RUN -->
        <div class="sec">
          <span class="sec-icon">◈</span>
          RUN
          <div class="sec-line"></div>
        </div>

        <button class="btn-simulate" id="btn-simulate" onclick="runSimulation()">
          <span class="btn-label">&#9654; SIMULATE</span>
        </button>

        <div class="error-msg" id="error-msg"></div>

      </div>
    </aside>

    <!-- RIGHT: OUTPUT -->
    <div class="output-panel">

      <div class="output-header">
        <h2>BALANCE OUTPUT</h2>
      </div>

      <div class="chart-container" id="chart-container">
        <div class="placeholder" id="placeholder">
          <svg width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1">
            <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
          </svg>
          <p>Configure parameters and press <strong>SIMULATE</strong></p>
        </div>
        <canvas id="chart" style="display:none; position:absolute; inset:20px;"></canvas>
      </div>

      <div class="summary" id="summary">
        <div class="summary-grid">
          <div class="stat-cell">
            <div class="stat-label">TOTAL WAVES</div>
            <div class="stat-value accent" id="s-total">—</div>
          </div>
          <div class="stat-cell">
            <div class="stat-label">DANGER WAVES</div>
            <div class="stat-value danger" id="s-danger">—</div>
          </div>
          <div class="stat-cell">
            <div class="stat-label">TRIVIAL WAVES</div>
            <div class="stat-value trivial" id="s-trivial">—</div>
          </div>
          <div class="stat-cell">
            <div class="stat-label">BALANCED WAVES</div>
            <div class="stat-value ok" id="s-balanced">—</div>
          </div>
        </div>

        <div class="waves-row">
          <div class="waves-row-label">DANGER WAVES</div>
          <div class="pills" id="danger-pills">
            <span class="no-waves">NONE</span>
          </div>
        </div>

        <div class="waves-row">
          <div class="waves-row-label">TRIVIAL WAVES</div>
          <div class="pills" id="trivial-pills">
            <span class="no-waves">NONE</span>
          </div>
        </div>
      </div>

    </div>
  </main>

  <!-- FOOTER -->
  <footer>
    <span>© CMG Forge — Free, forever.</span>
    <a href="https://cmgforge.com">cmgforge.com</a>
  </footer>

</div>

<script>
  let chartInstance = null;

  function getVal(id) {
    return parseFloat(document.getElementById(id).value) || 0;
  }

  async function runSimulation() {
    const btn   = document.getElementById('btn-simulate');
    const label = btn.querySelector('.btn-label');
    const errEl = document.getElementById('error-msg');

    errEl.style.display = 'none';
    btn.classList.add('loading');
    label.textContent = 'SIMULATING';

    const payload = {
      wave_count:   parseInt(document.getElementById('wave_count').value) || 20,
      player_hp:    getVal('player_hp'),
      player_dps:   getVal('player_dps'),
      player_scale: getVal('player_scale'),
      enemy_hp:     getVal('enemy_hp'),
      enemy_damage: getVal('enemy_damage'),
      enemy_scale:  getVal('enemy_scale'),
    };

    try {
      const res  = await fetch('api/simulate', {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify(payload),
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || 'Server error');

      renderChart(data);
      renderSummary(data);

    } catch (err) {
      errEl.textContent = '⚠ ' + err.message;
      errEl.style.display = 'block';
    } finally {
      btn.classList.remove('loading');
      label.textContent = '▶ SIMULATE';
    }
  }

  function renderChart({ waves, player_power, enemy_difficulty, danger_waves }) {
    document.getElementById('placeholder').style.display = 'none';
    const canvas = document.getElementById('chart');
    canvas.style.display = 'block';

    // Build danger-zone annotation bands (groups of consecutive danger waves)
    const dangerSet = new Set(danger_waves);
    const bands = [];
    let start = null;
    for (let i = 0; i < waves.length; i++) {
      if (dangerSet.has(waves[i])) {
        if (start === null) start = i;
      } else {
        if (start !== null) { bands.push({ xMin: start, xMax: i - 1 }); start = null; }
      }
    }
    if (start !== null) bands.push({ xMin: start, xMax: waves.length - 1 });

    if (chartInstance) { chartInstance.destroy(); chartInstance = null; }

    const ctx = canvas.getContext('2d');

    // Inline plugin for danger-zone shading
    const dangerPlugin = {
      id: 'dangerZones',
      beforeDraw(chart) {
        const { ctx: c, chartArea: { top, bottom }, scales: { x } } = chart;
        bands.forEach(({ xMin, xMax }) => {
          const left  = x.getPixelForValue(xMin);
          const right = x.getPixelForValue(xMax);
          c.save();
          c.fillStyle = 'rgba(255,68,68,0.07)';
          c.fillRect(left, top, right - left, bottom - top);
          // Top edge line
          c.strokeStyle = 'rgba(255,68,68,0.20)';
          c.lineWidth = 1;
          c.beginPath();
          c.moveTo(left, top);
          c.lineTo(right, top);
          c.stroke();
          c.restore();
        });
      }
    };

    chartInstance = new Chart(ctx, {
      type: 'line',
      plugins: [dangerPlugin],
      data: {
        labels: waves.map(w => `W${w}`),
        datasets: [
          {
            label: 'Player Power',
            data:  player_power,
            borderColor:     '#f97316',
            backgroundColor: 'rgba(249,115,22,0.06)',
            borderWidth: 2,
            pointRadius: waves.length <= 25 ? 3 : 0,
            pointHoverRadius: 5,
            pointBackgroundColor: '#f97316',
            pointBorderColor: '#f97316',
            tension: 0.3,
            fill: false,
          },
          {
            label: 'Enemy Difficulty',
            data:  enemy_difficulty,
            borderColor:     '#ff4444',
            backgroundColor: 'rgba(255,68,68,0.06)',
            borderWidth: 2,
            pointRadius: waves.length <= 25 ? 3 : 0,
            pointHoverRadius: 5,
            pointBackgroundColor: '#ff4444',
            pointBorderColor: '#ff4444',
            tension: 0.3,
            fill: false,
          },
        ],
      },
      options: {
        responsive: false,
        animation: { duration: 350 },
        interaction: { mode: 'index', intersect: false },
        plugins: {
          legend: {
            labels: {
              color: '#64748b',
              font: { family: "'Share Tech Mono', monospace", size: 11 },
              usePointStyle: true,
              pointStyleWidth: 14,
              padding: 20,
            }
          },
          tooltip: {
            backgroundColor: '#0f1120',
            borderColor: 'rgba(99,102,241,0.3)',
            borderWidth: 1,
            titleColor: '#f97316',
            bodyColor: '#f1f5f9',
            titleFont: { family: "'Share Tech Mono', monospace", size: 12 },
            bodyFont:  { family: "'Share Tech Mono', monospace", size: 12 },
            padding: 12,
            callbacks: {
              label(ctx) {
                return `  ${ctx.dataset.label}: ${ctx.parsed.y.toFixed(2)}`;
              }
            }
          }
        },
        scales: {
          x: {
            ticks: {
              color: '#64748b',
              font: { family: "'Share Tech Mono', monospace", size: 10 },
              maxRotation: 0,
              autoSkip: true,
              maxTicksLimit: 15,
            },
            grid: { color: 'rgba(99,102,241,0.08)' },
            border: { color: 'rgba(99,102,241,0.15)' },
          },
          y: {
            ticks: {
              color: '#64748b',
              font: { family: "'Share Tech Mono', monospace", size: 10 },
            },
            grid: { color: 'rgba(99,102,241,0.08)' },
            border: { color: 'rgba(99,102,241,0.15)' },
          }
        }
      }
    });

    // Resize canvas to fill container
    const container = document.getElementById('chart-container');
    canvas.width  = container.clientWidth  - 40;
    canvas.height = container.clientHeight - 40;
    chartInstance.resize();
  }

  function renderSummary({ waves, danger_waves, trivial_waves }) {
    const balanced = Math.max(0, waves.length - danger_waves.length - trivial_waves.length);

    document.getElementById('s-total').textContent   = waves.length;
    document.getElementById('s-danger').textContent  = danger_waves.length;
    document.getElementById('s-trivial').textContent = trivial_waves.length;
    document.getElementById('s-balanced').textContent = balanced;

    const dangerEl  = document.getElementById('danger-pills');
    const trivialEl = document.getElementById('trivial-pills');
    dangerEl.innerHTML  = '';
    trivialEl.innerHTML = '';

    if (danger_waves.length === 0) {
      dangerEl.innerHTML = '<span class="no-waves">NONE</span>';
    } else {
      danger_waves.forEach(w => {
        const p = document.createElement('span');
        p.className   = 'pill danger';
        p.textContent = `W${w}`;
        dangerEl.appendChild(p);
      });
    }

    if (trivial_waves.length === 0) {
      trivialEl.innerHTML = '<span class="no-waves">NONE</span>';
    } else {
      trivial_waves.forEach(w => {
        const p = document.createElement('span');
        p.className   = 'pill trivial';
        p.textContent = `W${w}`;
        trivialEl.appendChild(p);
      });
    }

    document.getElementById('summary').classList.add('visible');
  }

  document.addEventListener('keydown', e => {
    if (e.key === 'Enter') runSimulation();
  });
</script>

</body>
</html>
